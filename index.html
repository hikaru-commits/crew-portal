<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>海上従業員 各種手続き</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        "Hiragino Kaku Gothic ProN",
        "Yu Gothic",
        sans-serif;
      background: #f2f5f8;
      color: #1f2937;
    }

    .container {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      padding: 32px 18px 48px;
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
    }

    .header-icon {
      font-size: 46px;
      margin-bottom: 8px;
    }

    h1 {
      margin: 0;
      font-size: 25px;
      line-height: 1.4;
      color: #0d2d4f;
    }

    .subtitle {
      margin-top: 10px;
      font-size: 14px;
      line-height: 1.7;
      color: #64748b;
    }

    .menu {
      display: grid;
      gap: 16px;
    }

    .menu-button {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
      min-height: 96px;
      padding: 18px;
      border-radius: 16px;
      background: #ffffff;
      color: #1f2937;
      text-decoration: none;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.08);
      transition:
        transform 0.15s ease,
        box-shadow 0.15s ease;
    }

    .menu-button:active {
      transform: scale(0.98);
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.1);
    }

    .icon {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      width: 58px;
      height: 58px;
      border-radius: 14px;
      background: #e8f1fa;
      font-size: 30px;
    }

    .text-area {
      flex: 1;
      min-width: 0;
    }

    .button-title {
      display: block;
      margin-bottom: 5px;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.4;
      color: #12395f;
    }

    .button-description {
      display: block;
      font-size: 13px;
      line-height: 1.6;
      color: #64748b;
    }

    .arrow {
      flex-shrink: 0;
      margin-left: 4px;
      font-size: 24px;
      color: #94a3b8;
    }

    .notice {
      margin-top: 28px;
      padding: 16px;
      border-radius: 12px;
      background: #ffffff;
      font-size: 13px;
      line-height: 1.7;
      color: #475569;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.05);
    }

    .footer {
      margin-top: 28px;
      text-align: center;
      font-size: 12px;
      color: #94a3b8;
    }

    @media (min-width: 700px) {
      .container {
        padding-top: 48px;
      }
    }
  </style>
</head>

<body>
  <main class="container">

    <header class="header">
      <div class="header-icon">🚢</div>
      <h1>海上従業員 各種手続き</h1>
      <p class="subtitle">
        該当する手続きを選択してください。
      </p>
    </header>

    <section class="menu">

      <!-- 出国・帰国・乗船・下船連絡 -->
      <a
        class="menu-button"
        href="https://forms.cloud.microsoft/pages/responsepage.aspx?id=PkNEvaWp1Um8N7bfayZ7sNt3DPCo1G1BoeNmgk8ox9ZUNjJRRE9BOVAyNkZDR1JVRkxJOVU1NTM3QS4u&route=shorturl"
        target="_blank"
        rel="noopener noreferrer"
      >
        <span class="icon">✈️</span>

        <span class="text-area">
          <span class="button-title">
            出国・帰国・乗船・下船連絡
          </span>
          <span class="button-description">
            乗下船時または出国・帰国時の連絡はこちら
          </span>
        </span>

        <span class="arrow">›</span>
      </a>

      <!-- 雑費経費精算 -->
      <a
        class="menu-button"
        href="https://forms.cloud.microsoft/Pages/ResponsePage.aspx?id=PkNEvaWp1Um8N7bfayZ7sICn9OoLXj1DnayB6jCipG5UMFMxTjVKTFhIQkgyN09BODNSNUhPUDJONC4u"
        target="_blank"
        rel="noopener noreferrer"
      >
        <span class="icon">🧾</span>

        <span class="text-area">
          <span class="button-title">
            雑費経費精算
          </span>
          <span class="button-description">
            雑費などの経費精算はこちら
          </span>
        </span>

        <span class="arrow">›</span>
      </a>

      <!-- 旅費経費精算 -->
      <a
        class="menu-button"
        href="https://forms.cloud.microsoft/pages/responsepage.aspx?id=PkNEvaWp1Um8N7bfayZ7sICn9OoLXj1DnayB6jCipG5UNVgyV0hDQVpNSDM4TllRNVdLR1VQSUpXQS4u&route=shorturl"
        target="_blank"
        rel="noopener noreferrer"
      >
        <span class="icon">🚆</span>

        <span class="text-area">
          <span class="button-title">
            旅費経費精算
          </span>
          <span class="button-description">
            交通費・宿泊費などの旅費精算はこちら
          </span>
        </span>

        <span class="arrow">›</span>
      </a>

    </section>

    <div class="notice">
      各ボタンを押すと、Microsoft Formsの入力画面が開きます。
      送信前に、入力内容に誤りがないか確認してください。
    </div>

    <footer class="footer">
      海上従業員向けポータル
    </footer>

  </main>
</body>
</html>
